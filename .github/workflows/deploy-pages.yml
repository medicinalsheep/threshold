name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run version:sync:check

      # Textures ship in-repo (public/bundle + textures). Do NOT regenerate 2K masters
      # on every deploy — that was ~2–3 min of CI. Local: npm run textures:gen:default
      - run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      # Mirror committed textures/import into dist-pages/bundle (copy only)
      - run: npm run bundle:assets

      - name: Verify starter textures in dist
        run: |
          test -f dist-pages/bundle/textures/threshold_manifest.json
          test -f dist-pages/bundle/textures/starter_ground_albedo_1k.png
          test -f dist-pages/bundle/textures/starter_ground_albedo_1k.webp
          test -f dist-pages/bundle/textures/starter_skin_light_albedo.png
          echo "texture bundle OK ($(find dist-pages/bundle/textures -type f | wc -l) files)"

      # One parallel verify fan-out (faster than serial node startups)
      - name: Static verifies
        run: |
          set -e
          node scripts/portal-ui-verify.cjs &
          p1=$!
          npm run controls:verify &
          p2=$!
          node scripts/negative-lod-verify.cjs &
          p3=$!
          node scripts/surface-verify.cjs &
          p4=$!
          npm run perf:verify &
          p5=$!
          node scripts/tc-drive-verify.cjs &
          p6=$!
          node scripts/tc-circuit-verify.cjs &
          p7=$!
          node scripts/intent-router-verify.cjs &
          p8=$!
          npm run physics:verify &
          p9=$!
          wait $p1 $p2 $p3 $p4 $p5 $p6 $p7 $p8 $p9

      # Optional headless sample — skip unless PERF_CI=1 (saves ~1–2 min)
      - name: Perf harness (headless, optional)
        if: env.PERF_CI == '1'
        continue-on-error: true
        run: npm run perf:harness -- --cubes 80 --seconds 3 --warm 1 --tier compatibility
        env:
          PERF_BASE: /

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Retry deploy (transient GitHub Pages failures)
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        id: deployment_retry

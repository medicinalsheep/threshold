name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run version:sync:check
      # Regenerate hero defaults + matching WebP sidecars into public/bundle/textures
      - run: npm run textures:gen:default
      - run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
      # Ensure dist-pages/bundle mirrors textures/import (manifest + PNGs + WebP)
      - run: npm run bundle:assets
      - name: Verify starter textures in dist
        run: |
          test -f dist-pages/bundle/textures/threshold_manifest.json
          test -f dist-pages/bundle/textures/starter_ground_albedo_1k.png
          test -f dist-pages/bundle/textures/starter_ground_albedo_1k.webp
          test -f dist-pages/bundle/textures/starter_skin_light_albedo.png
          echo "texture bundle OK ($(find dist-pages/bundle/textures -type f | wc -l) files)"
      - run: node scripts/portal-ui-verify.cjs
      - run: npm run controls:verify
      - run: node scripts/negative-lod-verify.cjs
      - run: node scripts/surface-verify.cjs
      - run: npm run perf:verify
      - run: node scripts/tc-drive-verify.cjs
      - run: node scripts/tc-circuit-verify.cjs
      - run: node scripts/intent-router-verify.cjs
      # Headless browser sample (WebGL); non-blocking if GPU stack flakes on runner
      - name: Perf harness (headless)
        continue-on-error: true
        run: npm run perf:harness -- --cubes 200 --seconds 5 --warm 1 --tier compatibility --compare
        env:
          PERF_BASE: /

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Retry deploy (transient GitHub Pages failures)
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        id: deployment_retry
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run version:sync:check
      - run: npm run textures:gen:default
      - run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
      - run: node scripts/portal-ui-verify.cjs
      - run: npm run controls:verify
      - run: node scripts/tc-drive-verify.cjs
      - run: node scripts/tc-circuit-verify.cjs
      - run: node scripts/intent-router-verify.cjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Retry deploy (transient GitHub Pages failures)
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        id: deployment_retry